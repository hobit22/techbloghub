name: Backend Release Deploy

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: 'Git ref to build from'
        required: true
        default: 'main'
        type: string
      image_tag:
        description: 'Optional custom image tag (defaults to git-<shortsha>)'
        required: false
        default: ''
        type: string
      deploy_to_ec2:
        description: 'Deploy the pushed image to EC2 after publish'
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

concurrency:
  group: backend-release-production
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      image_uri: ${{ steps.image.outputs.image_uri }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref }}

      - name: Resolve image metadata
        id: meta
        env:
          INPUT_IMAGE_TAG: ${{ inputs.image_tag }}
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
        run: |
          set -euo pipefail

          if [ -z "$ECR_REPOSITORY" ]; then
            echo 'Repository variable ECR_REPOSITORY is required.' >&2
            exit 1
          fi

          short_sha="$(git rev-parse --short HEAD)"
          if [ -n "$INPUT_IMAGE_TAG" ]; then
            image_tag="$INPUT_IMAGE_TAG"
          else
            image_tag="git-$short_sha"
          fi

          echo "image_tag=$image_tag" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials with OIDC
        if: ${{ vars.AWS_ROLE_TO_ASSUME != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Configure AWS credentials with access keys
        if: ${{ vars.AWS_ROLE_TO_ASSUME == '' && secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_SECRET_ACCESS_KEY != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Fail when AWS credentials are not configured
        if: ${{ vars.AWS_ROLE_TO_ASSUME == '' && (secrets.AWS_ACCESS_KEY_ID == '' || secrets.AWS_SECRET_ACCESS_KEY == '') }}
        run: |
          echo 'Configure either vars.AWS_ROLE_TO_ASSUME for OIDC or AWS access key secrets.' >&2
          exit 1

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Finalize image URI
        id: image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
        run: |
          set -euo pipefail
          image_uri="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          echo "image_uri=$image_uri" >> "$GITHUB_OUTPUT"
          echo "image_uri=$image_uri" >> "$GITHUB_STEP_SUMMARY"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./fastapi
          file: ./fastapi/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.image.outputs.image_uri }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-to-ec2:
    if: ${{ inputs.deploy_to_ec2 }}
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy image to EC2
        uses: appleboy/ssh-action@v1.2.0
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          IMAGE_URI: ${{ needs.build-and-push.outputs.image_uri }}
          CONTAINER_NAME: ${{ vars.EC2_CONTAINER_NAME }}
          CONTAINER_PORT: ${{ vars.EC2_CONTAINER_PORT }}
          HOST_PORT: ${{ vars.EC2_HOST_PORT }}
          ENV_FILE_PATH: ${{ vars.EC2_ENV_FILE_PATH }}
          HEALTHCHECK_URL: ${{ vars.EC2_HEALTHCHECK_URL }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          port: ${{ vars.EC2_PORT != '' && vars.EC2_PORT || '22' }}
          envs: AWS_REGION,IMAGE_URI,CONTAINER_NAME,CONTAINER_PORT,HOST_PORT,ENV_FILE_PATH,HEALTHCHECK_URL
          script_stop: true
          script: |
            set -euo pipefail

            required_vars=(AWS_REGION IMAGE_URI CONTAINER_NAME CONTAINER_PORT HOST_PORT ENV_FILE_PATH HEALTHCHECK_URL)
            for required_var in "${required_vars[@]}"; do
              if [ -z "${!required_var}" ]; then
                echo "Missing required deployment variable: $required_var" >&2
                exit 1
              fi
            done

            if ! command -v aws >/dev/null 2>&1; then
              echo 'aws CLI is required on the EC2 host for ECR login.' >&2
              exit 1
            fi

            if ! command -v docker >/dev/null 2>&1; then
              echo 'Docker is required on the EC2 host.' >&2
              exit 1
            fi

            if [ ! -f "$ENV_FILE_PATH" ]; then
              echo "Env file not found: $ENV_FILE_PATH" >&2
              exit 1
            fi

            registry="${IMAGE_URI%%/*}"
            previous_image=""

            aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "$registry"
            docker pull "$IMAGE_URI"

            if docker ps -a --format '{{.Names}}' | grep -Fx "$CONTAINER_NAME" >/dev/null 2>&1; then
              previous_image="$(docker inspect --format='{{.Config.Image}}' "$CONTAINER_NAME" || true)"
              docker stop "$CONTAINER_NAME" || true
              docker rm "$CONTAINER_NAME" || true
            fi

            docker run -d \
              --name "$CONTAINER_NAME" \
              --restart unless-stopped \
              --env-file "$ENV_FILE_PATH" \
              -p "${HOST_PORT}:${CONTAINER_PORT}" \
              "$IMAGE_URI"

            for attempt in $(seq 1 24); do
              if curl -fsS "$HEALTHCHECK_URL" >/dev/null; then
                echo "Deployment succeeded with image $IMAGE_URI"
                exit 0
              fi
              sleep 5
            done

            docker logs "$CONTAINER_NAME" || true

            if [ -n "$previous_image" ]; then
              echo "Rolling back to $previous_image"
              docker stop "$CONTAINER_NAME" || true
              docker rm "$CONTAINER_NAME" || true
              docker run -d \
                --name "$CONTAINER_NAME" \
                --restart unless-stopped \
                --env-file "$ENV_FILE_PATH" \
                -p "${HOST_PORT}:${CONTAINER_PORT}" \
                "$previous_image"
            fi

            exit 1
