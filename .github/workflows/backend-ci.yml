name: Backend CI

on:
  pull_request:
    paths:
      - 'fastapi/**'
      - '.github/workflows/backend-ci.yml'
      - '.github/workflows/backend-release-deploy.yml'
  push:
    branches:
      - main
    paths:
      - 'fastapi/**'
      - '.github/workflows/backend-ci.yml'
      - '.github/workflows/backend-release-deploy.yml'

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fastapi
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: fastapi/requirements.txt

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Compile Python sources
        run: python -m compileall app main.py

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./fastapi
          file: ./fastapi/Dockerfile
          load: true
          tags: techbloghub-fastapi:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start backend smoke test container
        run: |
          docker run -d \
            --name techbloghub-fastapi-ci \
            -p 18000:8000 \
            -e APP_NAME='TechBlog Hub CI' \
            -e APP_VERSION='ci' \
            -e DEBUG='false' \
            -e DATABASE_URL='postgresql+asyncpg://ci:ci@localhost:5432/techbloghub_ci' \
            -e ALLOWED_ORIGINS='["http://localhost:3000"]' \
            -e ADMIN_USERNAME='ci-admin' \
            -e ADMIN_PASSWORD='ci-password' \
            -e OPENAI_API_KEY='sk-ci-placeholder' \
            -e OPENAI_MODEL='gpt-4o-mini' \
            -e OPENAI_MAX_TOKENS='1000' \
            -e RSS_PROXY_URL='' \
            -e DISCORD_WEBHOOK_ENABLED='false' \
            -e DISCORD_WEBHOOK_URL='' \
            -e ELASTICSEARCH_URL='http://localhost:9200' \
            techbloghub-fastapi:ci-${{ github.sha }}

      - name: Verify health endpoint
        run: |
          for attempt in $(seq 1 24); do
            if curl -fsS http://127.0.0.1:18000/health > /tmp/backend-health.json; then
              cat /tmp/backend-health.json
              exit 0
            fi
            sleep 5
          done

          echo 'Backend health check failed' >&2
          exit 1

      - name: Show container logs on failure
        if: failure()
        run: docker logs techbloghub-fastapi-ci

      - name: Clean up smoke test container
        if: always()
        run: docker rm -f techbloghub-fastapi-ci
